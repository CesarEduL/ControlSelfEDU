<script>
        function setRole(role) {
            const roles = ['estudiante', 'padre', 'docente'];
            roles.forEach(r => {
                const btn = document.getElementById(`role-${r}`);
                if (r === role) {
                    btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant');
                    btn.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm', 'ring-1', 'ring-outline-variant');
                } else {
                    btn.classList.add('text-on-surface-variant', 'hover:bg-surface-variant');
                    btn.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm', 'ring-1', 'ring-outline-variant');
                }
            });
            
            // Interaction: Dynamic feedback based on role color
            const submitBtn = document.querySelector('button[type="submit"]');
            if (role === 'estudiante') {
                submitBtn.className = "w-full bg-secondary text-on-secondary font-headline-md text-headline-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all mt-4";
            } else if (role === 'padre') {
                submitBtn.className = "w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all mt-4";
            } else {
                submitBtn.className = "w-full bg-on-primary-fixed-variant text-on-primary-fixed font-headline-md text-headline-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all mt-4";
            }
        }
        
        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            setRole('estudiante');
        });
    </script>
