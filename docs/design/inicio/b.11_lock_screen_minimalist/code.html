<script>
        // Simple Micro-interaction for the robot eye movement effect
        document.addEventListener('mousemove', (e) => {
            const robot = document.querySelector('.material-symbols-outlined[data-icon="smart_toy"]');
            const rect = robot.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const dist = 2; // pixel movement
            
            const moveX = Math.cos(angle) * dist;
            const moveY = Math.sin(angle) * dist;
            
            robot.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Suppress generic browser back buttons as this is a lock-style screen
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.go(1);
        };
    </script>
